name: 🧪 BeTalent QA - Automated Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 8 * * MON-FRI' # Executar segunda a sexta às 8:00

jobs:
  test-ui:
    name: 🎯 UI Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    strategy:
      matrix:
        node-version: [18.x]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3
      
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: 📚 Install dependencies
        run: npm install
      
      - name: 🎮 Install Playwright browsers
        run: npx playwright install --with-deps
      
      - name: 🧪 Run UI Tests
        run: npm run test:ui
        env:
          UI_BASE_URL: https://www.saucedemo.com
          PLAYWRIGHT_HEADLESS: true
      
      - name: 📊 Upload UI Test Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: ui-test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 30
      
      - name: 📸 Upload Screenshots
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: ui-screenshots-failure
          path: ui-testing/evidence/
          retention-days: 7

  test-api:
    name: 🔌 API Tests (Axios)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    strategy:
      matrix:
        node-version: [18.x]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3
      
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: 📚 Install dependencies
        run: npm install
      
      - name: 🧪 Run API Tests
        run: npm run test:api
        env:
          API_BASE_URL: https://restful-booker.herokuapp.com
          API_TIMEOUT: 10000
      
      - name: 📊 Upload API Test Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: api-test-results
          path: api-testing/evidence/
          retention-days: 30

  report:
    name: 📈 Generate Report
    runs-on: ubuntu-latest
    needs: [test-ui, test-api]
    if: always()
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3
      
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
          cache: 'npm'
      
      - name: 📚 Install dependencies
        run: npm install
      
      - name: 📊 Download artifacts
        uses: actions/download-artifact@v3
      
      - name: 📝 Create summary
        run: |
          echo "## 🧪 Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date**: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📌 Test Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- [📋 UI Test Results](ui-test-results/)" >> $GITHUB_STEP_SUMMARY
          echo "- [🔌 API Test Results](api-test-results/)" >> $GITHUB_STEP_SUMMARY
      
      - name: 💬 Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🧪 BeTalent QA Tests\n\n✅ All tests have been executed!\n\n- 📋 UI Tests: Check artifacts for screenshots and video recordings\n- 🔌 API Tests: Check artifacts for detailed API responses\n\nView the [full test report](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            })

  lint:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3
      
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
          cache: 'npm'
      
      - name: 📚 Install dependencies
        run: npm install
      
      - name: 🔍 Check for syntax errors
        run: npm run test:ui -- --list 2>&1 | head -20 || true

  notify-status:
    name: 📢 Notification
    runs-on: ubuntu-latest
    needs: [test-ui, test-api]
    if: always()
    
    steps:
      - name: ✅ Success Notification
        if: success()
        run: |
          echo "✅ All tests passed successfully!"
          echo "🎉 Build status: SUCCESS"
      
      - name: ❌ Failure Notification
        if: failure()
        run: |
          echo "❌ Some tests failed!"
          echo "🔍 Check the artifacts for more details"
          exit 1
